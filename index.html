<title>退職スマイル｜営業ダッシュボード</title>
<style>
html,body{margin:0;height:100%;background:#2d3e50;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;}
iframe{border:0;width:100%;height:100%;position:fixed;inset:0;background:#fff;}
.load{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#cbd6e2;gap:14px;}
.sp{width:34px;height:34px;border:3px solid #46586d;border-top-color:#ff7a59;border-radius:50%;animation:r 1s linear infinite;}
@keyframes r{to{transform:rotate(360deg)}}
.fb{position:fixed;bottom:10px;right:14px;font-size:11px;color:#fff;opacity:.75;z-index:2;}
.fb a{color:#ffd9a8;}
</style>
</head>
<body>
<div class="load" id="ld"><div class="sp"></div><div>ダッシュボードを読み込み中…</div></div>
<iframe id="app" src="https://script.google.com/macros/s/AKfycbwUhVN0kHYvYe_BiDtyNWLx1CGm5_p5Scuif314sbrFTXxobWdJ9lkYToJIBH3q-YvS/exec" allow="clipboard-write" onload="document.getElementById('ld').style.display='none'"></iframe>
<div class="fb">表示されない場合 → <a href="https://script.google.com/macros/s/AKfycbwUhVN0kHYvYe_BiDtyNWLx1CGm5_p5Scuif314sbrFTXxobWdJ9lkYToJIBH3q-YvS/exec" target="_top">直接開く</a></div>

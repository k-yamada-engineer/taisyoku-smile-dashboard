<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>退職スマイル｜営業ダッシュボード</title>
<style>
html,body{margin:0;height:100%;background:#2d3e50;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;}
.load{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#cbd6e2;gap:14px;}
.sp{width:34px;height:34px;border:3px solid #46586d;border-top-color:#ff7a59;border-radius:50%;animation:r 1s linear infinite;}
@keyframes r{to{transform:rotate(360deg)}}
a{color:#ffd9a8;}
</style>
</head>
<body>
<div class="load" id="ld"><div class="sp"></div><div>ダッシュボードを開いています…<br><a href="https://script.google.com/macros/s/AKfycbwUhVN0kHYvYe_BiDtyNWLx1CGm5_p5Scuif314sbrFTXxobWdJ9lkYToJIBH3q-YvS/exec" id="fb" style="font-size:12px;">自動で移動しない場合はこちら</a></div></div>
<script>
// iframe埋め込みは廃止（別ドメイン埋め込み特有の表示崩れ・X-Frame-Options依存の脆さを避けるため、フルページ遷移に統一）
// URLパラメータ(?k=管理キー 等)とハッシュを中のGASアプリへそのまま転送する
var target='https://script.google.com/macros/s/AKfycbwUhVN0kHYvYe_BiDtyNWLx1CGm5_p5Scuif314sbrFTXxobWdJ9lkYToJIBH3q-YvS/exec'+(location.search||'')+(location.hash||'');
document.getElementById('fb').href=target;
location.replace(target);
</script>
</body>
</html>
